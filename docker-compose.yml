services:
  gorouter:
    build: .
    ports:
      - "14747:14747"
    volumes:
      - gorouter-data:/app/data
    environment:
      - DATA_DIR=/app/data
      - JWT_SECRET=change-me-in-production
      - INITIAL_PASSWORD=123456
      - PORT=14747
      - HOSTNAME=0.0.0.0

volumes:
  gorouter-data:
