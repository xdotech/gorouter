name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -ldflags="-s -w" -o gorouter ./cmd/gorouter

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: gorouter-linux-amd64
          path: gorouter

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t gorouter:${{ github.sha }} .

      - name: Verify container starts
        run: |
          docker run -d --name gorouter-test \
            -p 14747:14747 \
            -e JWT_SECRET=ci-test-secret \
            -e INITIAL_PASSWORD=test123 \
            gorouter:${{ github.sha }}
          sleep 3
          curl -sf http://localhost:14747/api/init || exit 1
          docker stop gorouter-test
